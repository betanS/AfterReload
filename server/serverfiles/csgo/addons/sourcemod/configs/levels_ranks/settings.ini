"LR_Settings"
{
    "MainSettings"
    {
        // Nombre de la tabla en la base de datos
        "lr_table" "lvl_base"

        // Tipo de estadisticas: 0 - Acumulativo (Empieza desde 0 puntos)
        "lr_type_statistics" "0"

        // Flag de admin para el menu (z = Root)
        "lr_flag_adminmenu" "z"

        // Titulo del menu principal
        "lr_plugin_title" "Levels Ranks"

        // Sonidos de subir/bajar de rango (1-Si, 0-No)
        "lr_sound" "1"
        "lr_sound_lvlup" "levels_ranks/levelup.mp3"
        "lr_sound_lvldown" "levels_ranks/leveldown.mp3"

        // Minimo de jugadores para dar puntos (Puesto en 2 para que puedas probar con tu amigo)
        "lr_minplayers_count" "2"

        // Permitir a los jugadores resetear sus stats (!resetstats)
        "lr_show_resetmystats" "1"
        "lr_resetmystats_cooldown" "86400"

        // Mensajes de puntos en el chat (1-Mensaje por cada kill)
        "lr_show_usualmessage" "1"
        "lr_show_spawnmessage" "0"
        "lr_show_levelup_message" "1"
        "lr_show_leveldown_message" "1"
        "lr_show_rankmessage" "1"
        "lr_show_ranklist" "1"

        // No dar puntos durante el calentamiento
        "lr_block_warmup" "1"

        // Limpiar base de datos de jugadores inactivos (30 dias)
        "lr_cleandb_days" "30"

        // Guardar datos al salir y al final de ronda
        "lr_db_savedataplayer_mode" "1"
        "lr_db_allow_utf8mb4" "1"
        "lr_db_character_type" "0"
    }
}