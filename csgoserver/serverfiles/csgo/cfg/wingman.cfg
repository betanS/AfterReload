// ##########################################################
// AFTERRELOAD - CONFIGURACIÓN MODO WINGMAN (COMPAÑERO)
// ##########################################################

// 1. Identidad del Servidor
hostname "AfterReload | Wingman 2v2 [Skins/Ranks]"
sv_tags "afterreload,wingman,skins,ranks,espanol"

// 2. Forzar el modo de juego (Esto arregla que no salga Casual)
game_type 0
game_mode 2

// 3. Ajustes de Partida
mp_maxrounds 16              // Como el oficial, gana el que llega a 9
mp_freezetime 5
mp_roundtime 1.5
mp_warmuptime 60
mp_autoteambalance 1
mp_limitteams 1

// 4. Skins y Rangos (IMPORTANTE)
// sv_pure 0 evita el lag de CPU y permite que carguen skins custom
sv_pure 0
sv_lan 0

// FastDL - Para que los jugadores bajen los modelos rápido y no haya lag
sv_downloadurl "http://185.47.131.129/csgo/"
sv_allowdownload 1
sv_allowupload 1

// 5. Sincronización de Plugins
// Esto fuerza a que los plugins lean la base de datos al cambiar de mapa
sm_lvl_reload
sm_lvl_chat_reload
sm plugins reload weapons
sm plugins reload gloves

// 6. Configuración de Red (128 Tickrate)
sv_minrate 128000
sv_maxrate 0
sv_minupdaterate 128
sv_mincmdrate 128

writeid
writeip
