// Base server configuration for AfterReload
sv_lan 0
sv_pure 0
sv_region 3
sv_hibernate_when_empty 0

// Networking
sv_minrate 80000
sv_maxrate 0
sv_mincmdrate 128
sv_maxcmdrate 128
sv_minupdaterate 128
sv_maxupdaterate 128
rate 786432

// Logging
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_logflush 0

// RCON
rcon_password ""

// FastDL (if used)
sv_downloadurl "http://185.47.131.129/fastdl/"
sv_allowdownload 1
sv_allowupload 1

// Basic rules
sv_cheats 0
sv_alltalk 0
sv_deadtalk 0
sv_talk_enemy_dead 0
sv_talk_enemy_living 0

// Match settings defaults
mp_autoteambalance 1
mp_limitteams 1
mp_freezetime 15
mp_roundtime 1.92
mp_roundtime_defuse 1.92
mp_maxrounds 30
mp_halftime 1
mp_warmup_end