// Configuración base
hostname "AfterReload | Matchmaking 5v5"
sv_pure 0
exec server.cfg

// Get5 - Conexión con Laravel
get5_remote_log_url "https://afterreload.com/api/get5/events"
get5_remote_log_header_key "Authorization"
get5_remote_log_header_value "Bearer CHANGE_ME_GET5_TOKEN"
get5_server_id "1"

// Comportamiento de Matchmaking
get5_check_auths 1                 // Solo permite entrar a los que están en el match
get5_kick_when_no_match_loaded 0   // Permite entrar al server si no hay partido (para calentar)
get5_print_damage 1                // Muestra daño al final del round

// get5_loadmatch_url "https://afterreload.com/api/get5/match/{LOBBY_ID}" "Authorization" "Bearer CHANGE_ME_GET5_TOKEN"
